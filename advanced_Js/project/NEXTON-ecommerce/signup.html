<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - E-Commerce Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">
    <div class="auth-container">
        <div class="auth-wrapper">
         

            <!-- Sign Up Form -->
            <div class="auth-form-container">
                <h1 class="auth-title mb-4">Register</h1>
                <p class="auth-subtitle mb-4">Create your account to get started</p>

                <form class="auth-form">
                    <div class="mb-4">
                        <label for="name" class="auth-label">Full Name</label>
                        <div class="auth-input-wrapper">
                            <i class="bi bi-person auth-input-icon"></i>
                            <input type="text" class="form-control auth-input" id="name" placeholder="Enter your full name" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="email" class="auth-label">Email</label>
                        <div class="auth-input-wrapper">
                            <i class="bi bi-envelope auth-input-icon"></i>
                            <input type="email" class="form-control auth-input" id="email" placeholder="example@example.com" required>
                        </div>
                    </div>


                    <div class="mb-4">
                        <label for="password" class="auth-label">Password</label>
                        <div class="auth-input-wrapper">
                            <i class="bi bi-lock auth-input-icon"></i>
                            <input type="password" class="form-control auth-input" id="password" placeholder="Enter your password" required>
                            <button type="button" class="auth-password-toggle" id="togglePassword" aria-label="Toggle password visibility">
                                <i class="bi bi-eye" id="passwordIcon"></i>
                            </button>
                        </div>
                        <small class="text-muted">Password must be at least 6 characters long.</small>
                    </div>

                    <div class="mb-4">
                        <label for="password-again" class="auth-label">Password (Again)</label>
                        <div class="auth-input-wrapper">
                            <i class="bi bi-lock-fill auth-input-icon"></i>
                            <input type="password" class="form-control auth-input" id="password-again" placeholder="Confirm your password" required>
                            <button type="button" class="auth-password-toggle" id="togglePasswordAgain" aria-label="Toggle password visibility">
                                <i class="bi bi-eye" id="passwordAgainIcon"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn auth-btn w-100 mb-3">
                        <span class="auth-btn-text">Continue</span>
                        <i class="bi bi-arrow-right auth-btn-icon"></i>
                    </button>
                </form>

                <div class="auth-divider">
                    <span>OR</span>
                </div>

                <div class="auth-footer text-center mt-4">
                    <p class="auth-footer-text">
                        Already a member? <a href="./login.html" class="auth-link">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>
    <script>
        // Redirect if already logged in
        redirectIfLoggedIn();

        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const togglePasswordAgain = document.getElementById('togglePasswordAgain');
        const passwordInput = document.getElementById('password');
        const passwordAgainInput = document.getElementById('password-again');
        const passwordIcon = document.getElementById('passwordIcon');
        const passwordAgainIcon = document.getElementById('passwordAgainIcon');

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            passwordIcon.classList.toggle('bi-eye');
            passwordIcon.classList.toggle('bi-eye-slash');
        });

        togglePasswordAgain.addEventListener('click', function() {
            const type = passwordAgainInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordAgainInput.setAttribute('type', type);
            passwordAgainIcon.classList.toggle('bi-eye');
            passwordAgainIcon.classList.toggle('bi-eye-slash');
        });

        // Form submission - Registration
        const form = document.querySelector('.auth-form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form values
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const passwordAgain = document.getElementById('password-again').value;

            // All new registrations are automatically "customer" role
            // Admin account is predefined in auth.js and cannot be created through registration
            const role = 'customer';

            // Validate passwords match
            if (password !== passwordAgain) {
                passwordAgainInput.classList.add('auth-input-error');
                showMessage('Passwords do not match!', 'error');
                setTimeout(() => {
                    passwordAgainInput.classList.remove('auth-input-error');
                }, 3000);
                return;
            }

            // Register user (automatically as customer)
            const result = registerUser(email, password, role, name);

            if (result.success) {
                showMessage('Registration successful! Redirecting to login...', 'success');
                // Redirect to login page after successful registration
                setTimeout(() => {
                    // Pass email as URL parameter for convenience (optional)
                    window.location.href = `./login.html?email=${encodeURIComponent(email)}`;
                }, 1500);
            } else {
                showMessage(result.message, 'error');
            }
        });
    </script>
</body>

</html>
