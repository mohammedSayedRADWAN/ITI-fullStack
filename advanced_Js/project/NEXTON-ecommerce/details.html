<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <nav class="navbar navbar-expand-lg navbar-light  shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <img src="src/logo.png" alt="logo">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar content -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav  m-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link "  href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="shop.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                </ul>

              

                <!-- Right side icons -->
                <div class="d-flex align-items-center gap-3">
                    <!-- Shopping Cart Icon (only for customers) -->
                    <a href="cart.html" class="text-decoration-none position-relative text-white" id="cartLink" title="Shopping Cart" style="display: none;">
                        <i class="bi bi-cart3 fs-4"></i>
                        <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                    </a>
                    <!-- Wishlist Icon -->
                    <a href="wishlist.html" class="text-decoration-none position-relative text-white" id="wishlistLink" title="Wishlist" style="display: none;">
                        <i class="bi bi-heart fs-4"></i>
                        <span id="wishlist-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                    </a>

                    <!-- User Info (when logged in) -->
                    <span id="userInfo" class="text-white me-2" style="display: none; font-size: 0.9rem;"></span>

                    <!-- Login Link (when not logged in) -->
                    <a href="login.html" class="btn btn-outline-light btn-sm" id="loginLink" style="display: none;">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </a>

                    <!-- Profile/Logout Icon (when logged in) -->
                    <div class="dropdown" id="profileDropdownContainer" style="display: none;">
                        <a class="text-decoration-none text-white" href="#" role="button" id="profileDropdown"
                            data-bs-toggle="dropdown" aria-expanded="false" title="Profile">
                            <i class="bi bi-person-circle fs-4"></i>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdown">
                            <li><span class="dropdown-item-text"><small id="userInfoDropdown"></small></span></li>
                            <li><hr class="dropdown-divider"></li>
                            <li id="adminDashboardLink" style="display: none;"><a class="dropdown-item" href="admin-dashboard.html"><i class="bi bi-speedometer2"></i> Admin Dashboard</a></li>
                            <li id="trackOrderLink" style="display: none;"><a class="dropdown-item" href="track.html"><i class="bi bi-truck"></i> Track Orders</a></li>
                            <li><a class="dropdown-item" href="#"><i class="bi bi-person"></i> Profile</a></li>
                            <li><a class="dropdown-item" href="#"><i class="bi bi-gear"></i> Settings</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" id="logoutLink"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>


    <div class="container py-4">
        <div id="details-container" class="mb-5">
            </div>

        <hr class="my-5">

        <div class="recommended-section">
            <h3 class="fw-bold mb-4">You might also like</h3>
            <div id="rec-container" class="row g-4">
                </div>
        </div>
    </div>

    <footer class="bg-light py-4 mt-5">
        <div class="container text-center text-muted">
            <small>&copy; 2026 Nexton Shop</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="auth.js"></script>
    <script src="products.js"></script>
    <script src="details.js"></script>
    <script>
        // Update navigation on page load
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof updateNavigation !== 'undefined') {
                updateNavigation();
            }
            
            // Logout functionality
            const logoutLink = document.getElementById('logoutLink');
            if (logoutLink) {
                logoutLink.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (typeof logoutUser !== 'undefined') {
                        logoutUser();
                        if (typeof updateNavigation !== 'undefined') {
                            updateNavigation();
                        }
                        if (typeof showMessage !== 'undefined') {
                            showMessage('Logged out successfully', 'success');
                        }
                        setTimeout(() => {
                            window.location.href = './login.html';
                        }, 1000);
                    }
                });
            }
        });
    </script>
</body>
</html>
