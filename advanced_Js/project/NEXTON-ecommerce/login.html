<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Commerce Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">
    <div class="auth-container">
        <div class="auth-wrapper">
            <!-- Login Form -->
            <div class="auth-form-container">
                <h1 class="auth-title mb-4">Login</h1>
                <p class="auth-subtitle mb-4">Welcome back! Please sign in to your account</p>

                <form class="auth-form">
                    <div class="mb-4">
                        <label for="email" class="auth-label">Email</label>
                        <div class="auth-input-wrapper">
                            <i class="bi bi-envelope auth-input-icon"></i>
                            <input type="email" class="form-control auth-input" id="email" placeholder="example@example.com" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="auth-label">Password</label>
                        <div class="auth-input-wrapper">
                            <i class="bi bi-lock auth-input-icon"></i>
                            <input type="password" class="form-control auth-input" id="password" placeholder="Enter your password" required>
                            <button type="button" class="auth-password-toggle" id="togglePassword" aria-label="Toggle password visibility">
                                <i class="bi bi-eye" id="passwordIcon"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn auth-btn w-100 mb-3">
                        <span class="auth-btn-text">Continue</span>
                        <i class="bi bi-arrow-right auth-btn-icon"></i>
                    </button>
                </form>

                <div class="auth-divider">
                    <span>OR</span>
                </div>

                <div class="auth-footer text-center mt-4">
                    <p class="auth-footer-text">
                        New user? <a href="./signup.html" class="auth-link">Create an account</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>
    <script>
        // Redirect if already logged in
        redirectIfLoggedIn();

        // Pre-fill email from URL parameter (if coming from signup)
        const urlParams = new URLSearchParams(window.location.search);
        const emailParam = urlParams.get('email');
        if (emailParam) {
            const emailInput = document.getElementById('email');
            if (emailInput) {
                emailInput.value = decodeURIComponent(emailParam);
                // Show a helpful message
                showMessage('Registration successful! Please log in with your credentials.', 'success');
            }
        }

        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const passwordIcon = document.getElementById('passwordIcon');

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            passwordIcon.classList.toggle('bi-eye');
            passwordIcon.classList.toggle('bi-eye-slash');
        });

        // Form submission - Login
        const form = document.querySelector('.auth-form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form values
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Login user
            const result = loginUser(email, password);

            if (result.success) {
                showMessage(result.message, 'success');
                // Redirect based on role
                setTimeout(() => {
                    if (result.user.role === 'admin') {
                        window.location.href = './admin-dashboard.html';
                    } else {
                        window.location.href = './index.html';
                    }
                }, 1000);
            } else {
                showMessage(result.message, 'error');
            }
        });
    </script>
</body>

</html>
