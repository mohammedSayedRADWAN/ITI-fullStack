<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      const repo = '/fym-mearn46r2'; // Repo Name
      const path = window.location.pathname.slice(repo.length) || '/';
      const search = window.location.search;
      const hash = window.location.hash;
      const redirectUrl = repo + '/?redirect=' + encodeURIComponent(path + search + hash);
      window.location.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
