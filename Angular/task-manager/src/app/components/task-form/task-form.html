<div class="task-form-container">
  <div class="form-header">
    <h2 class="form-title">➕ Create New Task</h2>
    <a routerLink="/" class="back-link">← Back to Tasks</a>
  </div>

  <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="task-form">
    <div class="form-group">
      <label for="title" class="form-label">Task Title *</label>
      <input
        type="text"
        id="title"
        formControlName="title"
        class="form-input"
        placeholder="Enter task title..."
        [class.error]="taskForm.get('title')?.invalid && taskForm.get('title')?.touched"
      >
      <div class="error-message" *ngIf="taskForm.get('title')?.invalid && taskForm.get('title')?.touched">
        <span *ngIf="taskForm.get('title')?.errors?.['required']">Title is required</span>
        <span *ngIf="taskForm.get('title')?.errors?.['minlength']">Title must be at least 3 characters</span>
      </div>
    </div>

    <div class="form-group">
      <label for="description" class="form-label">Task Description *</label>
      <textarea
        id="description"
        formControlName="description"
        class="form-textarea"
        placeholder="Enter task description..."
        rows="4"
        [class.error]="taskForm.get('description')?.invalid && taskForm.get('description')?.touched"
      ></textarea>
      <div class="error-message" *ngIf="taskForm.get('description')?.invalid && taskForm.get('description')?.touched">
        <span *ngIf="taskForm.get('description')?.errors?.['required']">Description is required</span>
        <span *ngIf="taskForm.get('description')?.errors?.['minlength']">Description must be at least 10 characters</span>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" routerLink="/" class="btn btn-secondary">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="taskForm.invalid">
        <span class="btn-icon">✓</span>
        Create Task
      </button>
    </div>
  </form>

  <div class="form-info" *ngIf="taskForm.valid && taskForm.touched">
    <p class="success-message">✅ Form is valid and ready to submit!</p>
  </div>
</div>
