<div class="card shadow-sm border-0 bg-dark text-white p-3 rounded-4 animate__animated animate__pulse animate__infinite">
  <div class="d-flex align-items-center gap-3">
    <div class="clock-icon fs-1">
      <i class="bi bi-clock-fill"></i>
    </div>
    <div>
      <h6 class="text-uppercase tracking-wider opacity-75 mb-0">Current Time</h6>
      <h2 class="display-6 fw-bold text-gradient mb-0">{{ currentTime | date:'hh:mm:ss a' }}</h2>
      <small class="opacity-50 fw-semibold">{{ currentTime | date:'EEEE, MMMM d' }}</small>
    </div>
  </div>
</div>
