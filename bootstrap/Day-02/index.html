<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 1-2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid bg-dark text-white p-3 mb-4">Full Width Header</div>

    <div class="container">
        <div class="p-4 border rounded bg-light mb-4 text-center">
            <h3>Control Center</h3>
            <button class="btn btn-danger btn-lg" onclick="removeContent()">
                Toggle: Show/Remove Main Content
            </button>
        </div>

        <div id="mainContentArea">
            <section class="mb-5">
                <h2>Responsive Image</h2>
                <img src="https://picsum.photos/800/300" class="img-fluid rounded shadow" alt="Responsive">
            </section>

            <section>
                <h2>6 Rows of Thumbnails</h2>
                <div class="row">
                    <div class="col-12 mb-2 border-bottom"><img src="https://picsum.photos/50" class="img-thumbnail m-1"> Row 1</div>
                    <div class="col-12 mb-2 border-bottom"><img src="https://picsum.photos/51" class="img-thumbnail m-1"> Row 2</div>
                    <div class="col-12 mb-2 border-bottom"><img src="https://picsum.photos/52" class="img-thumbnail m-1"> Row 3</div>
                    <div class="col-12 mb-2 border-bottom"><img src="https://picsum.photos/53" class="img-thumbnail m-1"> Row 4</div>
                    <div class="col-12 mb-2 border-bottom"><img src="https://picsum.photos/54" class="img-thumbnail m-1"> Row 5</div>
                    <div class="col-12 mb-2 border-bottom"><img src="https://picsum.photos/55" class="img-thumbnail m-1"> Row 6</div>
                </div>
            </section>
        </div>
    </div>

    <script>
        function removeContent() {
            const content = document.getElementById('mainContentArea');
            content.classList.toggle('d-none');
        }
    </script>
</body>
</html>
