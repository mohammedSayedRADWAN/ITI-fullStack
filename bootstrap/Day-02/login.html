<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 4: Login Validation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card p-4 shadow mx-auto" style="max-width: 400px;">
            <h3>Login Form </h3>
            <form id="loginForm" class="needs-validation" novalidate>
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" required>
                    <div id="userAlert" class="alert alert-danger alert-dismissible fade show mt-2 d-none" role="alert">
                        Name should be more than 5 letters [cite: 9]
                        <button type="button" class="btn-close" onclick="closeAlert()"></button>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
        </div>
    </div>
    <script>
        const userInp = document.getElementById('username');
        const alertBox = document.getElementById('userAlert');

        userInp.addEventListener('blur', () => { 
            if (userInp.value.length < 5 && userInp.value.length > 0) {
                alertBox.classList.remove('d-none');
            } else {
                alertBox.classList.add('d-none');
            }
        });

        function closeAlert() { alertBox.classList.add('d-none'); }
    </script>
</body>
</html>
