<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickSort Demo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; background: #f5f7fb; color: #24292e; }
    .container { max-width: 520px; margin: 0 auto; padding: 20px; background: white; border: 1px solid #d1d5da; border-radius: 8px; }
    label { display: block; margin-bottom: 8px; font-weight: bold; }
    input, button { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
    button { margin-top: 12px; background: #0366d6; color: white; border-color: #0366d6; cursor: pointer; }
    button:hover { background: #035bc1; }
    #result { margin-top: 20px; padding: 12px; background: #f1f8ff; border-radius: 6px; border: 1px solid #c8e1ff; white-space: pre-wrap; }
    .error { margin-top: 20px; color: #d73a49; }
  </style>
</head>
<body>
  <div class="container">
    <h1>QuickSort Demo</h1>
    <p>Enter numbers separated by commas or spaces:</p>
    <label for="numbers">Array</label>
    <input id="numbers" placeholder="e.g. 10, 7, 8, 9, 1, 5" />
    <button id="sortBtn">Sort with QuickSort</button>
    <div id="result"></div>
    <div id="error" class="error"></div>
  </div>

  <script src="vibe.js"></script>
  <script>
    const numbersInput = document.getElementById('numbers');
    const sortBtn = document.getElementById('sortBtn');
    const resultDiv = document.getElementById('result');
    const errorDiv = document.getElementById('error');

    sortBtn.addEventListener('click', () => {
      errorDiv.textContent = '';
      resultDiv.textContent = '';
      const value = numbersInput.value.trim();
      if (!value) {
        errorDiv.textContent = 'Enter at least one number.';
        return;
      }

      try {
        const sorted = quicksortUI(value);
        resultDiv.textContent = 'Sorted: [' + sorted.join(', ') + ']';
      } catch (err) {
        errorDiv.textContent = err.message;
      }
    });
  </script>
</body>
</html>
